name: CD

# 仅 push 到 main 时部署（PR 不触发）
on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 引用 prod 环境：
    #   - SSH_KEY 放 Environment secrets（敏感，日志打码）
    #   - 其余（SSH_HOST/USER/PORT/DEPLOY_PATH）放 Environment variables，用 vars. 读取
    # 可在环境里开启保护规则（如部署前需审批、仅 main 可部署）。
    environment: prod
    steps:
      - name: SSH 登录并部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            # 部署目录：优先用 Environment variable SSH_DEPLOY_PATH，否则回退到 $HOME/apps/miao-infra
            DEPLOY_PATH="${{ vars.SSH_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="$HOME/apps/miao-infra"
            fi
            cd "$DEPLOY_PATH"

            # 合并基础 compose 与服务器覆盖（发布非默认端口到 0.0.0.0）
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.server.yml"

            echo ">>> 同步最新代码（丢弃服务器本地未提交改动，保证与 origin/main 一致）"
            # 注意：不能用 `git pull`，一旦服务器工作区有本地修改（如手动 scp 覆盖）
            # 就会 merge 冲突导致整个部署失败。CD 服务器本不应有未提交改动，
            # 因此用 fetch + reset --hard 强制对齐远程。
            git fetch --quiet origin
            git reset --hard "origin/${GITHUB_REF_NAME:-main}"

            echo ">>> docker compose pull"
            $COMPOSE pull

            echo ">>> docker compose up -d"
            $COMPOSE up -d

            echo ">>> 状态"
            $COMPOSE ps

            # 回收未被引用的旧镜像，释放磁盘（可选，不删 volume）
            docker image prune -f
