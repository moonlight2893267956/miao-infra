name: CD

# 仅 push 到 main 时部署（PR 不触发）
on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 引用 prod 环境：
    #   - SSH_KEY 放 Environment secrets（敏感，日志打码）
    #   - 其余（SSH_HOST/USER/PORT/DEPLOY_PATH）放 Environment variables，用 vars. 读取
    # 可在环境里开启保护规则（如部署前需审批、仅 main 可部署）。
    environment: prod
    steps:
      - name: SSH 登录并部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ vars.SSH_DEPLOY_PATH || '$HOME/apps/miao-infra' }}"

            # 合并基础 compose 与服务器覆盖（发布非默认端口到 0.0.0.0）
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.server.yml"

            echo ">>> git pull"
            git pull --ff-only

            echo ">>> docker compose pull"
            $COMPOSE pull

            echo ">>> docker compose up -d"
            $COMPOSE up -d

            echo ">>> 状态"
            $COMPOSE ps

            # 回收未被引用的旧镜像，释放磁盘（可选，不删 volume）
            docker image prune -f
