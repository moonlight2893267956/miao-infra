name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 防止并发 CI 抢占同一 runner 资源（本仓库轻量，仅做静态校验）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------
  # 1. YAML 格式校验
  # ---------------------------------------------------------------
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml

  # ---------------------------------------------------------------
  # 2. compose 配置校验（语法 + 必填变量）
  #    用 dummy .env，绝不接触真实密钥
  # ---------------------------------------------------------------
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 写入 CI 用 dummy .env
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=ci_root_pw_change_me
          MYSQL_USER=miao
          MYSQL_PASSWORD=ci_miao_pw_change_me
          REDIS_PASSWORD=ci_redis_pw_change_me
          NACOS_AUTH_IDENTITY_KEY=ci_nacos
          NACOS_AUTH_IDENTITY_VALUE=ci_nacos
          NACOS_AUTH_TOKEN=ci_token_ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789abcdefghijklmnop
          EOF
      - name: 校验 compose 配置
        run: docker compose config -q
