name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 防止并发 CI 抢占同一 runner 资源（本仓库轻量，主要是健康测试要拉镜像）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # 1. YAML 格式校验
  # ---------------------------------------------------------------
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml

  # ---------------------------------------------------------------
  # 2. compose 配置校验（语法 + 必填变量）
  #    用 dummy .env，绝不接触真实密钥
  # ---------------------------------------------------------------
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 写入 CI 用 dummy .env
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=ci_root_pw_change_me
          MYSQL_USER=miao
          MYSQL_PASSWORD=ci_miao_pw_change_me
          REDIS_PASSWORD=ci_redis_pw_change_me
          EOF
      - name: 校验 compose 配置
        run: docker compose config -q

  # ---------------------------------------------------------------
  # 3. 真实拉起并等待 healthcheck 通过
  # ---------------------------------------------------------------
  healthy-up:
    runs-on: ubuntu-latest
    needs: compose-validate
    steps:
      - uses: actions/checkout@v4
      - name: 写入 CI 用 dummy .env
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=ci_root_pw_change_me
          MYSQL_USER=miao
          MYSQL_PASSWORD=ci_miao_pw_change_me
          REDIS_PASSWORD=ci_redis_pw_change_me
          EOF
      - name: 启动服务
        run: docker compose up -d
      - name: 等待健康（最多 ~3 分钟）
        run: |
          for i in $(seq 1 36); do
            unhealthy=$(docker compose ps --format '{{.Service}} {{.Health}}' | awk '$2!="healthy"{print $1}')
            if [ -z "$unhealthy" ]; then
              echo "全部服务 healthy ✅"
              docker compose ps
              exit 0
            fi
            echo "等待中 ($i/36)，尚未 healthy: $unhealthy"
            sleep 5
          done
          echo "::error::超时，服务未全部进入 healthy 状态"
          docker compose ps
          docker compose logs
          exit 1
      - name: 清理（总是执行）
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------
  # 4. 镜像漏洞扫描（Trivy）
  # ---------------------------------------------------------------
  trivy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - mysql:8.4
          - redis:7-alpine
    steps:
      # 仅出报告、不阻断 CI（官方基础镜像常带上游 CVE，严格拦截意义不大）。
      # 若想恢复拦截：把 exit-code 改回 "1" 即可。
      - name: Trivy 扫描 ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library
