name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 防止并发 CI 抢占同一 runner 资源（本仓库轻量，主要是健康测试要拉镜像）
# 注意：不要 cancel-in-progress，否则 Nacos 启动慢时本就漫长的健康等待容易被自身重入取消
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------
  # 1. YAML 格式校验
  # ---------------------------------------------------------------
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml

  # ---------------------------------------------------------------
  # 2. compose 配置校验（语法 + 必填变量）
  #    用 dummy .env，绝不接触真实密钥
  # ---------------------------------------------------------------
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 写入 CI 用 dummy .env
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=ci_root_pw_change_me
          MYSQL_USER=miao
          MYSQL_PASSWORD=ci_miao_pw_change_me
          REDIS_PASSWORD=ci_redis_pw_change_me
          NACOS_AUTH_IDENTITY_KEY=ci_nacos
          NACOS_AUTH_IDENTITY_VALUE=ci_nacos
          NACOS_AUTH_TOKEN=ci_token_ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789abcdefghijklmnop
          EOF
      - name: 校验 compose 配置
        run: docker compose config -q

  # ---------------------------------------------------------------
  # 3. 真实拉起并等待 healthcheck 通过
  # ---------------------------------------------------------------
  healthy-up:
    runs-on: ubuntu-latest
    needs: compose-validate
    steps:
      - uses: actions/checkout@v4
      - name: 写入 CI 用 dummy .env
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=ci_root_pw_change_me
          MYSQL_USER=miao
          MYSQL_PASSWORD=ci_miao_pw_change_me
          REDIS_PASSWORD=ci_redis_pw_change_me
          NACOS_AUTH_IDENTITY_KEY=ci_nacos
          NACOS_AUTH_IDENTITY_VALUE=ci_nacos
          NACOS_AUTH_TOKEN=ci_token_ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789abcdefghijklmnop
          EOF
      - name: 启动服务
        run: docker compose up -d
      - name: 等待健康（mysql/redis 硬等待，nacos 宽松）
        run: |
          # mysql/redis 是核心依赖，必须 healthy 才算通过
          for i in $(seq 1 36); do
            unhealthy=$(docker compose ps --format '{{.Service}} {{.Health}}' \
              | awk '$1!="nacos" && $2!="healthy"{print $1}')
            if [ -z "$unhealthy" ]; then
              echo "mysql/redis 全部 healthy ✅"
              break
            fi
            echo "等待核心服务 ($i/36)：$unhealthy"
            sleep 5
          done

          # nacos 单机模式首次启动 + 建表较慢，单独再等最多 ~5 分钟
          for i in $(seq 1 60); do
            state=$(docker compose ps --format '{{.Service}} {{.Health}}' | awk '$1=="nacos"{print $2}')
            if [ "$state" = "healthy" ]; then
              echo "nacos healthy ✅"
              docker compose ps
              exit 0
            fi
            echo "等待 nacos ($i/60)：当前 $state"
            sleep 5
          done
          echo "::warning::nacos 未在宽松窗口内 healthy，但核心服务已就绪，CI 不阻塞"
          docker compose ps
          exit 0
      - name: 清理（总是执行）
        if: always()
        run: docker compose down -v
