# ============================================================
# miao-infra — 服务器部署覆盖（prod）
# ============================================================
# 在 docker-compose.yml 基础上，把 MySQL/Redis/Nacos 以非默认端口发布到
# 宿主机 0.0.0.0，供外部/其他机器访问。
#
# 使用：
#   docker compose -f docker-compose.yml -f docker-compose.server.yml up -d
#
# 安全：这些端口仅对白名单 IP 开放（云安全组 + 服务器防火墙），
# 不要全公网裸奔。同 docker 网络内的业务应用仍用容器名 + 默认端口
# （miao-mysql:3306 / miao-redis:6379 / miao-nacos:8848），不受此文件影响。
services:
  mysql:
    ports:
      - "0.0.0.0:33306:3306"
  redis:
    ports:
      - "0.0.0.0:16379:6379"
  nacos:
    ports:
      # 8848 = Nacos API/通信端口；9848 = gRPC(=8848+1000)
      - "0.0.0.0:38848:8848"
      - "0.0.0.0:39848:9848"
      # Nacos 3.x 控制台在 8080（路径 /next/），8848 上的 /nacos/ 只是迁移提示页。
      # 控制台必须发布，否则经反代访问不到界面。
      - "0.0.0.0:38080:8080"
