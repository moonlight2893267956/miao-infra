# ============================================================
# miao-infra — 服务器部署覆盖（prod）
# ============================================================
# 在 docker-compose.yml 基础上，把 MySQL/Redis 以非默认端口发布到
# 宿主机 0.0.0.0，供外部/其他机器访问。
#
# 使用：
#   docker compose -f docker-compose.yml -f docker-compose.server.yml up -d
#
# 安全：这些端口仅对白名单 IP 开放（云安全组 + 服务器防火墙），
# 不要全公网裸奔。同 docker 网络内的业务应用仍用容器名 + 默认端口
# （miao-mysql:3306 / miao-redis:6379），不受此文件影响。
services:
  mysql:
    ports:
      - "0.0.0.0:33306:3306"
  redis:
    ports:
      - "0.0.0.0:16379:6379"
