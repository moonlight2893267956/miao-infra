# ============================================================
# 自定义 Nacos 配置（【当前已弃用，不再挂载】）
# ============================================================
# 说明：自 2026-07-11 起，docker-compose.yml 的 nacos 服务不再挂载此文件覆盖
# 容器内默认 application.properties，而是改用 SPRING_DATASOURCE_PLATFORM=mysql
# 环境变量激活外部 mysql 数据源（Nacos 官方镜像的 docker-startup.sh 会自动把
# MYSQL_SERVICE_* 环境变量注入到默认配置）。
#
# 如需自定义连接池等参数，可恢复挂载并在此文件追加；否则保持不挂载即可。
#
# 关键前提：nacos_config 库必须先导入官方建表脚本，否则会报
#   "No Data Source set" / "dumpservice bean construction failure"
# 初始化命令（只需执行一次）：
#   docker exec miao-nacos cat /home/nacos/conf/mysql-schema.sql \
#     | docker exec -i miao-mysql mysql -u miao -p"$MYSQL_PASSWORD" nacos_config
# ============================================================

# 激活 mysql 数据源模式（关键）
spring.datasource.platform=mysql
# 控制初始化 SQL 脚本平台（与上面保持一致）
spring.sql.init.platform=mysql

# 数据库数量
db.num=${MYSQL_DATABASE_NUM:1}

# JDBC 连接（MySQL 8.4 + caching_sha2_password 兼容参数）
db.url.0=jdbc:mysql://${MYSQL_SERVICE_HOST}:${MYSQL_SERVICE_PORT:3306}/${MYSQL_SERVICE_DB_NAME}?characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
db.user.0=${MYSQL_SERVICE_USER}
db.password.0=${MYSQL_SERVICE_PASSWORD}

# 连接池（Druid）
db.pool.config.connectionTimeout=30000
db.pool.config.validationTimeout=10000

# 鉴权相关
nacos.core.auth.enabled=true
nacos.core.auth.plugin.nacos.token.secret.key=${NACOS_AUTH_TOKEN}
nacos.core.auth.server.identity.key=${NACOS_AUTH_IDENTITY_KEY:nacos}
nacos.core.auth.server.identity.value=${NACOS_AUTH_IDENTITY_VALUE:nacos}
