# 自定义 Nacos 配置：强制启用 MySQL 外部数据源（Nacos 2.5.x 默认注释了 spring.datasource.platform，
# 仅靠 SPRING_DATASOURCE_PLATFORM 环境变量无法激活 mysql 模式，会导致 No DataSource set）。
# 该文件通过 volume 挂载覆盖容器内的 /home/nacos/conf/application.properties。

# 激活 mysql 数据源模式（关键）
spring.datasource.platform=mysql
# 控制初始化 SQL 脚本平台（与上面保持一致）
spring.sql.init.platform=mysql

# 数据库数量
db.num=${MYSQL_DATABASE_NUM:1}

# JDBC 连接（MySQL 8.4 + caching_sha2_password 兼容参数）
db.url.0=jdbc:mysql://${MYSQL_SERVICE_HOST}:${MYSQL_SERVICE_PORT:3306}/${MYSQL_SERVICE_DB_NAME}?characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
db.user.0=${MYSQL_SERVICE_USER}
db.password.0=${MYSQL_SERVICE_PASSWORD}

# 连接池（Druid）
db.pool.config.connectionTimeout=30000
db.pool.config.validationTimeout=10000
