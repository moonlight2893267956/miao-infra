# ============================================================
# miao-infra — 共享基础设施
# ============================================================
# MySQL 8.4 + Redis 7 + Nacos，供 miao-toolbox / miao-ai 共用。
# 独立于任何业务项目，生命周期不受单个项目影响。
#
# 首次部署：
#   cd ~/apps/miao-infra
#   cat > .env <<EOF
#   MYSQL_ROOT_PASSWORD=xxx
#   MYSQL_USER=miao
#   MYSQL_PASSWORD=xxx
#   REDIS_PASSWORD=xxx
#   NACOS_AUTH_IDENTITY_KEY=nacos
#   NACOS_AUTH_IDENTITY_VALUE=nacos
#   EOF
#   docker compose up -d
#
# 初始化业务库（只需执行一次）：
#   docker exec miao-mysql mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e "
#     CREATE DATABASE IF NOT EXISTS miao_toolbox CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#     CREATE DATABASE IF NOT EXISTS miao_ai       CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#     CREATE DATABASE IF NOT EXISTS nacos_config  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#     GRANT ALL PRIVILEGES ON miao_toolbox.* TO 'miao'@'%';
#     GRANT ALL PRIVILEGES ON miao_ai.*       TO 'miao'@'%';
#     GRANT ALL PRIVILEGES ON nacos_config.*  TO 'miao'@'%';
#     FLUSH PRIVILEGES;
#   "
#
# Nacos 数据库表初始化（只需执行一次，否则会报 No Data Source set）：
#   # 先确保 nacos_config 库已创建，再导入官方建表脚本：
#   docker exec miao-nacos cat /home/nacos/conf/mysql-schema.sql \
#     | docker exec -i miao-mysql mysql -u miao -p"$MYSQL_PASSWORD" nacos_config
#   # 验证：USE nacos_config; SHOW TABLES; 应看到 config_info / users / roles 等 12 张表
#
# 接入方（miao-toolbox / miao-ai）在自己的 compose 里：
#   networks:
#     miao-infra-net:
#       external: true
#       name: miao-infra-net
#   services:
#     xxx:
#       networks: [miao-infra-net]
# ============================================================

services:
  mysql:
    image: mysql:8.4
    container_name: miao-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?必须设置 MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER:-miao}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - miao-toolbox_mysql-data:/var/lib/mysql
    networks:
      - miao-infra-net
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - 127.0.0.1
        - -u
        - root
        - -p${MYSQL_ROOT_PASSWORD}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: miao-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    networks:
      - miao-infra-net
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - ${REDIS_PASSWORD}
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    # 升级到 Nacos 3.2.x 稳定线（v3.2.2，latest stable patch）。
    # 3.x 沿用 SPRING_DATASOURCE_PLATFORM / MYSQL_SERVICE_* 环境变量注入 mysql 数据源，
    # 鉴权变量（NACOS_AUTH_*）在 3.x 仍强制且沿用，无需改动。
    # 注意：3.2.0+ 移除了 v1/v2 HTTP API，业务客户端需 2.x/3.x SDK（见 README 升级清单）。
    image: nacos/nacos-server:v3.2.2
    container_name: miao-nacos
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MODE: standalone
      # JVM 堆内存：默认 -Xms1g -Xmx1g 对 2Gi 小内存机器过于浪费（占整机 ~45% 且常触发 Swap）。
      # 配置量不大时 512m 足够，立省约 500MB 物理内存。官方镜像读取以下两个环境变量。
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      # 激活 mysql 外部数据源（3.2.x 官方仍支持该环境变量，数据源 Bean 可正常创建）
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: miao-mysql
      MYSQL_SERVICE_PORT: "3306"
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: ${MYSQL_USER:-miao}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD}
      # JDBC 连接附加参数：MySQL 8.x 默认 caching_sha2_password 认证，
      # Nacos 3.2 内置的新版 MySQL Connector/J 要求显式允许公钥获取，否则报
      # "Public Key Retrieval is not allowed" 导致 DataSource 初始化失败。
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false
      # 鉴权
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-nacos}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-nacos}
      # JWT 签名密钥：必须是 base64 编码且解码后 ≥ 32 字节（用 `openssl rand -base64 32` 生成）。
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      # 控制台管理员（首次启动后修改默认密码）
      NACOS_AUTH_USER_AGENT_AUTH_WHITE_ENABLE: "true"
    volumes:
      # 不再覆盖 application.properties：2.4.x 用上面的环境变量即可激活 mysql 模式，
      # 避免跨版本配置项差异（2.5.x 的覆盖文件反而会干扰 DataSource 注入）。
      - nacos-logs:/home/nacos/logs
      - nacos-data:/home/nacos/data
    networks:
      - miao-infra-net
    healthcheck:
      # Nacos 3.x 已移除 /nacos/v1/console/health/readiness 老端点，改用 metrics 接口探活。
      test:
        - CMD-SHELL
        - curl -f http://127.0.0.1:8848/nacos/v1/ns/operator/metrics || exit 1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  miao-toolbox_mysql-data:
    external: true
  redis-data:
  nacos-logs:
  nacos-data:

networks:
  miao-infra-net:
    name: miao-infra-net
    driver: bridge
