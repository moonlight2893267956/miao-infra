# ============================================================
# miao-infra — 共享基础设施
# ============================================================
# MySQL 8.4 + Redis 7 + Nacos，供 miao-toolbox / miao-ai 共用。
# 独立于任何业务项目，生命周期不受单个项目影响。
#
# 首次部署：
#   cd ~/apps/miao-infra
#   cat > .env <<EOF
#   MYSQL_ROOT_PASSWORD=xxx
#   MYSQL_USER=miao
#   MYSQL_PASSWORD=xxx
#   REDIS_PASSWORD=xxx
#   NACOS_AUTH_IDENTITY_KEY=nacos
#   NACOS_AUTH_IDENTITY_VALUE=nacos
#   EOF
#   docker compose up -d
#
# 初始化业务库（只需执行一次）：
#   docker exec miao-mysql mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e "
#     CREATE DATABASE IF NOT EXISTS miao_toolbox CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#     CREATE DATABASE IF NOT EXISTS miao_ai       CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#     CREATE DATABASE IF NOT EXISTS nacos_config  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#     GRANT ALL PRIVILEGES ON miao_toolbox.* TO 'miao'@'%';
#     GRANT ALL PRIVILEGES ON miao_ai.*       TO 'miao'@'%';
#     GRANT ALL PRIVILEGES ON nacos_config.*  TO 'miao'@'%';
#     FLUSH PRIVILEGES;
#   "
#
# Nacos 数据库表初始化（只需执行一次）：
#   # 先确保 nacos_config 库已创建，然后导入官方建表脚本（首次启动 Nacos 后也可通过 Web 界面初始化）
#
# 接入方（miao-toolbox / miao-ai）在自己的 compose 里：
#   networks:
#     miao-infra-net:
#       external: true
#       name: miao-infra-net
#   services:
#     xxx:
#       networks: [miao-infra-net]
# ============================================================

services:
  mysql:
    image: mysql:8.4
    container_name: miao-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?必须设置 MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER:-miao}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - miao-infra-net
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - 127.0.0.1
        - -u
        - root
        - -p${MYSQL_ROOT_PASSWORD}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: miao-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    networks:
      - miao-infra-net
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - ${REDIS_PASSWORD}
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: miao-nacos
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MODE: standalone
      # 复用 miao-mysql 存储（mysql 模式由挂载的 application.properties 显式激活，
      # 因为 Nacos 2.5.x 默认注释了 spring.datasource.platform）
      MYSQL_SERVICE_HOST: miao-mysql
      MYSQL_SERVICE_PORT: "3306"
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: ${MYSQL_USER:-miao}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD}
      # 鉴权
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-nacos}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-nacos}
      # JWT 签名密钥：必须是 base64 编码且解码后 ≥ 32 字节（用 `openssl rand -base64 32` 生成）。
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      # 控制台管理员（首次启动后修改默认密码）
      NACOS_AUTH_USER_AGENT_AUTH_WHITE_ENABLE: "true"
    volumes:
      # 覆盖容器内默认 application.properties，显式启用 mysql 数据源
      - ./nacos/application.properties:/home/nacos/conf/application.properties:ro
      - nacos-logs:/home/nacos/logs
      - nacos-data:/home/nacos/data
    networks:
      - miao-infra-net
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f http://127.0.0.1:8848/nacos/v1/console/health/readiness || exit 1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  mysql-data:
  redis-data:
  nacos-logs:
  nacos-data:

networks:
  miao-infra-net:
    name: miao-infra-net
    driver: bridge
